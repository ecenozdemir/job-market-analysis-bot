name: Daily Job Analysis Bot

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # BURASI YENİ: Robotun 'feedparser' gibi araçları yüklemesini sağlar
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Scraper
        run: python job_scraper.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add market_report.csv
          git commit -m "Daily market report updated" || exit 0
          git push
